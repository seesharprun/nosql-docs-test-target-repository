name: Relay article request
run-name: "📝 Relay #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
on:
  issues:
    types: [opened]
jobs:
  dispatch:
    if: contains(github.event.issue.labels.*.name, 'article-request')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Get relay GitHub App token
        uses: actions/create-github-app-token@v3
        id: relay-app-token
        with:
          client-id: ${{ secrets.RELAY_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELAY_APP_PRIVATE_KEY }}
          owner: seesharprun
          repositories: nosql-docs-agentic-side-pr
          permission-actions: write
      - name: Dispatch create-article workflow
        env:
          GH_TOKEN: ${{ steps.relay-app-token.outputs.token }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          gh workflow run create-article.workflow.lock.yml \
            --repo seesharprun/nosql-docs-agentic-side-pr \
            --ref main \
            --field title="$ISSUE_TITLE" \
            --field article_context="$ISSUE_BODY"
      - name: Get local GitHub App token
        uses: actions/create-github-app-token@v3
        id: local-app-token
        with:
          client-id: ${{ secrets.LOCAL_APP_CLIENT_ID }}
          private-key: ${{ secrets.LOCAL_APP_PRIVATE_KEY }}
          permission-issues: write
      - name: Label as dispatched
        env:
          GH_TOKEN: ${{ steps.local-app-token.outputs.token }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-label article-dispatched
      - name: Acknowledge dispatch
        env:
          GH_TOKEN: ${{ steps.local-app-token.outputs.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body '🚀 Article request dispatched to the writing agent. A draft PR will appear in this repo when the article is ready.'
